# Default configuration for CalibGuard-TF.
# CLI arguments in scripts can override these values.

data_root: data/toy_kitti/training
out_dir: runs/default_msf_calibnet
seed: 42

image:
  img_h: 192
  img_w: 640
  max_depth: 80.0

training:
  epochs: 30
  batch_size: 8
  steps_per_epoch: 1000
  val_steps: 100
  lr: 0.0003
  weight_decay: 0.0001
  val_ratio: 0.15

model:
  width_mult: 1.0
  token_dim: 96
  dropout: 0.10

drift:
  # Max random drift used for synthetic training data.
  max_roll_deg: 2.0
  max_pitch_deg: 2.0
  max_yaw_deg: 3.0
  max_tx_m: 0.20
  max_ty_m: 0.10
  max_tz_m: 0.20
